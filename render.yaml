# 🚀 Конфигурация для Render
services:
  # Тип сервиса: Web Service
  - type: web
    name: nutribudy-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInterval: 30
    envVars:
      # 🤖 Telegram Bot
      - key: BOT_TOKEN
        sync: false
        description: "Telegram Bot Token"
      - key: WEBHOOK_URL
        sync: false
        description: "Webhook URL (https://your-service.onrender.com)"
      - key: PORT
        value: "8080"
        description: "Port for Render"
      - key: ADMIN_ID
        sync: false
        description: "Admin Telegram ID (optional)"
      - key: LOG_TO_FILE
        value: "true"
        description: "Enable file logging"
      
      # 🧠 Cloudflare AI
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
        description: "Cloudflare Account ID for Hermes AI"
      - key: CLOUDFLARE_API_TOKEN
        sync: false
        description: "Cloudflare API Token for Hermes AI"
      - key: HERMES_MODEL_ID
        value: "@cf/meta/llama-3.1-8b-instruct"
        description: "Hermes model ID"
      - key: LLAMA_VISION_MODEL_ID
        value: "@cf/meta/llama-3.2-11b-vision-instruct"
        description: "Llama Vision model ID"
      
      # 🌤️ Weather API
      - key: OPENWEATHERMAP_API_KEY
        sync: false
        description: "OpenWeatherMap API Key for weather"
      
      # 🗄️ Database (Render provides automatically)
      - key: DATABASE_URL
        sync: false
        description: "PostgreSQL connection string"
