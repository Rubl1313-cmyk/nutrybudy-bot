name = "nutrition-bot-ai"
type = "javascript"
account_id = "REPLACE_WITH_ACCOUNT_ID"
workers_dev = true
compatibility_date = "2026-01-01"

# AI Bindings for Cloudflare Workers AI
[ai]
binding = "AI"

# KV Namespace for user data
[[kv_namespaces]]
binding = "NUTRITION_DATA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Environment variables (set via wrangler secret or in dashboard)
[vars]
BOT_TOKEN = "REPLACE_WITH_TELEGRAM_BOT_TOKEN"